<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08101f" />
    <meta name="description" content="A playful personal page for Kevin Homburg: software, travel stories, and an easy way to say hi." />
    <title>Kevin Homburg | Say Hi</title>
    <!-- Local Dependencies -->
    <script src="src/vendor/react.js"></script>
    <script src="src/vendor/react-dom.js"></script>
    <script src="src/vendor/i18next.js"></script>
    <script src="src/vendor/react-i18next.js"></script>
    <script src="src/vendor/i18nextBrowserLanguageDetector.js"></script>
    <script src="src/vendor/i18nextHttpBackend.js"></script>
    <script src="src/vendor/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/App.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="text/babel" src="src/hooks/useMousePosition.js"></script>
    <script type="text/babel" src="src/hooks/useFloatingParticles.js"></script>
    <script type="text/babel" src="src/components/LanguageSwitcher.js"></script>
    <script type="text/babel" src="src/components/BackgroundEffects.js"></script>
    <script type="text/babel" src="src/sections/HeroSection.js"></script>
    <script type="text/babel" src="src/sections/StorySection.js"></script>
    <script type="text/babel" src="src/sections/ReasonsSection.js"></script>
    <script type="text/babel" src="src/sections/ContactSection.js"></script>
    <script type="text/babel" src="src/App.js"></script>
    <script type="text/babel">
      const { initReactI18next } = window.ReactI18next;

      const initI18n = () => {
        return i18next
          .use(window.i18nextHttpBackend || {})
          .use(window.i18nextBrowserLanguageDetector || {})
          .use(initReactI18next)
          .init({
            fallbackLng: 'en',
            supportedLngs: ['en', 'de'],
            load: 'languageOnly',
            debug: false,
            backend: {
              loadPath: 'src/locales/{{lng}}.json',
            },
            interpolation: {
              escapeValue: false,
            }
          });
      };

      const renderApp = () => {
        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = ReactDOM.createRoot(rootElement);
          root.render(<window.App />);
        }
      };

      initI18n()
        .then(renderApp)
        .catch((err) => {
          console.error("i18n initialization failed:", err);
          renderApp();
        });
    </script>
  </body>
</html>
